<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="KosManager — Sistem manajemen kamar kos modern. Kelola kamar, penghuni, order, perbaikan, dan fasilitas dengan mudah.">
  <title>KosManager — Room Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- ══════════════════════════ SIDEBAR ══════════════════════════ -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <h1>Kos<span>Manager</span></h1>
      <p>v1.0.0 · admin</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Utama</div>
        <button class="nav-item active" onclick="navigate('dashboard')">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">Master Data</div>
        <button class="nav-item" onclick="navigate('master-kamar')">
          <i data-lucide="door-open"></i> Tipe Kamar
        </button>
        <button class="nav-item" onclick="navigate('master-customer')">
          <i data-lucide="users"></i> Customer
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">Operasional</div>
        <button class="nav-item" onclick="navigate('manajemen-kamar')">
          <i data-lucide="grid-2x2"></i> Manajemen Kamar
        </button>
        <button class="nav-item" onclick="navigate('order')">
          <i data-lucide="file-text"></i> Order / Sewa <span class="badge" id="order-badge"></span>
        </button>
        <button class="nav-item" onclick="navigate('pindah-kamar')">
          <i data-lucide="arrow-right-left"></i> Pindah Kamar
        </button>
        <button class="nav-item" onclick="navigate('perbaikan')">
          <i data-lucide="wrench"></i> Perbaikan <span class="badge" id="repair-badge"></span>
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">Lainnya</div>
        <button class="nav-item" onclick="navigate('fasilitas')">
          <i data-lucide="building-2"></i> Fasilitas Umum
        </button>
        <button class="nav-item" onclick="navigate('log')">
          <i data-lucide="scroll-text"></i> Log Aktivitas
        </button>
        <button class="nav-item" onclick="navigate('permintaan')">
          <i data-lucide="inbox"></i> Permintaan User <span class="badge" id="req-badge"></span>
        </button>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="nav-item" style="color:var(--slate-500)" onclick="openSettingsModal()">
        <i data-lucide="settings"></i> Pengaturan
      </button>
      <button class="nav-item" style="color:var(--slate-500)" onclick="resetAllData()">
        <i data-lucide="rotate-ccw"></i> Reset Data
      </button>
      <button class="nav-item" style="color:#ef4444" onclick="doLogout()">
        <i data-lucide="log-out"></i> Keluar
      </button>
    </div>
  </nav>

  <!-- ══════════════════════════ MAIN ══════════════════════════ -->
  <div id="main">
    <!-- TOPBAR -->
    <header id="topbar">
      <div class="topbar-left">
        <button class="btn-icon" id="menu-toggle" onclick="toggleSidebar()">
          <i data-lucide="menu" style="width:16px;height:16px"></i>
        </button>
        <span class="topbar-title" id="page-title">Dashboard</span>
      </div>
      <div class="topbar-right">
        <div class="avatar">AD</div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main id="page-content"></main>
  </div>

  <!-- ══════════════════════════ MODAL CONTAINER ══════════════════════════ -->
  <div id="modal-container"></div>

  <!-- ══════════════════════════ TOAST CONTAINER ══════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ══════════════════════════ TEMPLATES ══════════════════════════ -->

  <!-- Confirm Dialog -->
  <template id="tpl-modal-confirm">
    <div class="confirm-overlay">
      <div class="confirm-box">
        <div class="confirm-icon ic-red"><i data-lucide="alert-triangle" style="width:24px;height:24px"></i></div>
        <div class="confirm-title"></div>
        <div class="confirm-msg"></div>
        <div class="confirm-actions">
          <button class="btn btn-secondary" data-action="cancel">Batal</button>
          <button class="btn btn-danger" data-action="confirm">Hapus</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Settings Modal -->
  <template id="tpl-modal-settings">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Pengaturan</span><button class="modal-close"
          data-action="close"><i data-lucide="x" style="width:14px;height:14px"></i></button></div>
      <div class="modal-body">
        <div class="detail-row"><span class="detail-key">Versi</span><span class="detail-val">1.0.0</span></div>
        <div class="detail-row"><span class="detail-key">Penyimpanan</span><span class="detail-val">MySQL
            Database</span></div>
        <div
          style="margin-top:16px;padding:12px;background:var(--green-50);border-radius:8px;font-size:12px;color:var(--green-700)">
          <b>✅ Info:</b> Data tersimpan di MySQL database server.</div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" data-action="close">Tutup</button></div>
    </div>
  </template>
